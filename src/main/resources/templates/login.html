<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar Sesión & Registro</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="/css/styles.css" />
</head>

<body>
    <div class="container d-flex justify-content-center align-items-center vh-100 bg-claro">
        <div class="card w-100 p-4" style="max-width: 800px;">
            <div class="row" style="font-size: 1.2rem">
                <div class="col-md-6">


                    <!-- Panel de Inicio de Sesión -->
                    <div class="p-4">
                        <h2 class="text-center mb-4 texto-azul">
                            <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
                        </h2>
                        <form>
                            <div class="mb-3">
                                <label for="loginEmail" class="form-label texto-gris">
                                    Correo Electrónico <i class="bi bi-envelope"></i></label>
                                <input type="email" class="form-control" id="loginEmail"
                                    placeholder="Introduce tu correo electrónico" />
                            </div>
                            <div class="mb-3">
                                <label for="loginPassword" class="form-label texto-gris">Contraseña <i
                                        class="bi bi-lock"></i></label>
                                <input type="password" class="form-control" id="loginPassword"
                                    placeholder="Introduce tu contraseña" />
                            </div>
                            <div class="d-flex justify-content-center align-items-center" style="height: 60px">
                                <button type="submit" class="btn w-100 texto-claro bg-primario">
                                    <i class="bi bi-box-arrow-in-right "></i> Iniciar Sesión
                                </button>
                            </div>
                        </form>
                    </div>
                </div>


                <div class="col-md-6">
                    <!-- Panel de Registro -->
                    <div class="p-4 bg-claro">
                        <h2 class="text-center mb-4 texto-exito">
                            <i class="bi bi-person-plus-fill"></i>
                            Registrarse
                        </h2>
                        <form>
                            <div class="mb-3">
                                <label for="registroNombre" class="form-label texto-gris">Nombre Completo</label>
                                <input type="text" class="form-control" id="registroNombre"
                                    placeholder="Introduce tu nombre completo" />
                            </div>
                            <div class="mb-3">
                                <label for="registroEmail" class="form-label texto-gris">Correo Electrónico</label>
                                <input type="email" class="form-control" id="registroEmail"
                                    placeholder="Introduce tu correo electrónico" />
                            </div>
                            <div class="mb-3">
                                <label for="registroPassword" class="form-label texto-gris">Contraseña</label>
                                <input type="password" class="form-control" id="registroPassword"
                                    placeholder="Introduce tu contraseña" />
                            </div>
                            <div class="d-flex justify-content-center align-items-center" style="height: 60px">
                                <button type="submit" class="btn w-100 texto-claro bg-exito">
                                    <i class="bi bi-person-plus-fill"></i>
                                    Registrarse
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
