<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar Sesión</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />
</head>

<body class="d-flex flex-column min-vh-100 bg-light">
    <!-- Sección: Encabezado público -->
    <div th:replace="componentes/headerPublico :: headerPublico"></div>
    <!-- Sección principal de inicio de sesión -->
 <main class="container flex-grow-1 d-flex flex-column justify-content-center align-items-center py-4">
        <div class="mx-auto w-100" style="max-width:500px;">
            <!-- Formulario de inicio de sesión -->
            <form th:action="@{/loginprocess}" method="post" class="bg-white p-5 rounded-4 shadow-lg border-0">
                <div class="text-center mb-4">
                    <span class="d-inline-flex align-items-center justify-content-center rounded-circle bg-primary mb-3"
                        style="width:72px;height:72px;">
                        <i class="bi bi-box-arrow-in-right text-white fs-1"></i>
                    </span>
                    <h2 class="fw-bold text-primary mb-1 display-5">Iniciar Sesión</h2>
                    <p class="text-muted mb-2 fs-5">
                        Accede a tu cuenta para gestionar tus servicios y ofertas.
                    </p>
                </div>
                <div th:if="${success}" class="alert alert-success text-center w-100 mx-auto mb-3">
                    <i class="bi bi-check-circle-fill me-2"></i>
                    <span th:text="${success}"></span>
                </div>
                <div class="mb-4">
                    <label for="loginUsername" class="form-label fw-semibold text-dark fs-5 mb-2">
                        <i class="bi bi-person me-2"></i>Nombre de Usuario
                    </label>
                    <input type="text" class="form-control form-control-lg rounded-3 fs-5 py-3" id="loginUsername"
                        name="username" placeholder="Introduce tu nombre de usuario" required autofocus
                        aria-required="true" aria-label="Nombre de usuario" tabindex="1" />
                </div>
                <div class="mb-4">
                    <label for="loginPassword" class="form-label fw-semibold text-dark fs-5 mb-2">
                        <i class="bi bi-lock me-2"></i>Contraseña
                    </label>
                    <input type="password" class="form-control form-control-lg rounded-3 fs-5 py-3" id="loginPassword"
                        name="password" placeholder="Introduce tu contraseña" required aria-required="true"
                        aria-label="Contraseña" tabindex="2" />
                </div>
                <button type="submit"
                    class="btn btn-primary w-100 py-3 rounded-3 fw-bold d-flex align-items-center justify-content-center gap-2 fs-5"
                    aria-label="Iniciar sesión" tabindex="3">
                    <i class="bi bi-box-arrow-in-right"></i>
                    Iniciar Sesión
                </button>
            </form>
            <!-- Botón para volver al inicio -->
            <a href="/" class="btn btn-outline-primary w-100 rounded-3 mt-4 d-flex align-items-center justify-content-center gap-2 fs-5"
                tabindex="4" aria-label="Volver al inicio">
                <i class="bi bi-house"></i>
                Volver al Inicio
            </a>
        </div>
    </main>
    <!-- Pie de página -->
    <div th:replace="componentes/footer :: footer" class="mt-auto"></div>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
