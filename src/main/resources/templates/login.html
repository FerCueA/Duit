<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar Sesión</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="/css/styles.css" />
</head>

<body>
    <div class="container d-flex justify-content-center align-items-center vh-100 bg-light">
        <div class="card w-100 p-4" style="max-width: 400px; border: 1px solid var(--color-oscuro);">
            <div class="p-4">
                <h2 class="text-center mb-4 text-primary">
                    <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
                </h2>
                <form th:action="@{/loginprocess}" method="POST">
                    <div class="mb-3">
                        <label for="loginUsername" class="form-label text-secondary">
                            Nombre de Usuario <i class="bi bi-person"></i>
                        </label>
                        <input type="text" class="form-control" id="loginUsername" name="username" placeholder="Introduce tu nombre de usuario" required />
                    </div>
                    <div class="mb-3">
                        <label for="loginPassword" class="form-label text-secondary">
                            Contraseña <i class="bi bi-lock"></i>
                        </label>
                        <input type="password" class="form-control" id="loginPassword" name="password" placeholder="Introduce tu contraseña" required />
                    </div>
                    <div class="d-flex justify-content-center align-items-center" style="height: 60px">
                        <button type="submit" class="btn w-100 text-light bg-primary">
                            <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
                        </button>
                    </div>
                </form>
                <div class="d-flex justify-content-center align-items-center mt-3">
                    <a href="/" class="btn btn-outline-primary w-100">
                        <i class="bi bi-house"></i> Volver al Inicio
                    </a>
                </div>
            </div>
        </div>
    </div>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
