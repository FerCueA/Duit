<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar Sesión</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="/css/styles.css" />
</head>

<body>
    <div class="container d-flex justify-content-center align-items-center vh-100 bg-light">
        <div class="card w-100 p-4 border-0 shadow-lg rounded-4" role="form" aria-labelledby="login-title">
            <div class="p-4">
                <div class="text-center mb-4">
                    <div
                        class="bg-primary bg-opacity-25 rounded-circle d-inline-flex align-items-center justify-content-center mb-3">
                        <i class="bi bi-box-arrow-in-right text-primary fs-1" aria-hidden="true"></i>
                    </div>
                    <h2 id="login-title" class="fw-bold text-primary">
                        Iniciar Sesión
                    </h2>
                    <p class="text-muted">
                        Accede a tu cuenta para gestionar tus servicios y ofertas.
                    </p>
                </div>
                <form th:action="@{/loginprocess}" method="POST" autocomplete="on" aria-describedby="login-title">
                    <div class="mb-3">
                        <label for="loginUsername" class="form-label text-secondary fw-bold">
                            <i class="bi bi-person" aria-hidden="true"></i>
                            <span class="visually-hidden">Nombre de Usuario</span> Nombre de
                            Usuario
                        </label>
                        <input type="text" class="form-control form-control-lg" id="loginUsername" name="username"
                            placeholder="Introduce tu nombre de usuario" required autofocus aria-required="true"
                            aria-label="Nombre de usuario" tabindex="1" />
                    </div>
                    <div class="mb-3">
                        <label for="loginPassword" class="form-label text-secondary fw-bold">
                            <i class="bi bi-lock" aria-hidden="true"></i>
                            <span class="visually-hidden">Contraseña</span> Contraseña
                        </label>
                        <input type="password" class="form-control form-control-lg" id="loginPassword" name="password"
                            placeholder="Introduce tu contraseña" required aria-required="true" aria-label="Contraseña"
                            tabindex="2" />
                    </div>
                    <div class="d-flex justify-content-center align-items-center">
                        <button type="submit" class="btn btn-primary fw-bold w-100 py-2 shadow-sm"
                            aria-label="Iniciar sesión" tabindex="3">
                            <i class="bi bi-box-arrow-in-right" aria-hidden="true"></i>
                            Iniciar Sesión
                        </button>
                    </div>
                </form>
                <div class="d-flex justify-content-center align-items-center mt-3">
                    <a href="/" class="btn btn-outline-primary w-100" tabindex="4" aria-label="Volver al inicio">
                        <i class="bi bi-house" aria-hidden="true"></i> Volver al Inicio
                    </a>
                </div>
            </div>
        </div>
    </div>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
