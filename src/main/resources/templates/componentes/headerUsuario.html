<!-- Fragmento de encabezado de usuario -->
<div th:fragment="headerUsuario">
	<header class="navbar navbar-expand-lg bg-info bg-gradient text-dark border-bottom px-4 py-3 shadow-lg ">
		<div class="container-fluid d-flex flex-wrap justify-content-between align-items-center gap-4">
			<!-- Información del usuario -->
			<div class="d-flex align-items-center gap-3">
				<img src="/images/avatarPlaceholder.png" class="rounded-circle border border-3 shadow-sm" width="64"
					height="64" alt="Avatar" />
				<div class="d-flex flex-column justify-content-center gap-2">
					<div class="fw-bold d-flex align-items-center gap-2 fs-4">
						<span th:text="${usuario.nombre}">Usuario Ejemplo</span>
					</div>
					<div class="d-flex align-items-center gap-2">
						<i class="bi bi-envelope text-secondary fs-5"></i>
						<span class="text-muted small" th:text="${usuario.email}">usuario@email.com</span>
					</div>
					<span
						class="badge bg-primary text-white d-flex align-items-center gap-2 px-4 py-2 shadow rounded-3 text-uppercase header-badge mt-1"
						th:text="${usuario.rol.nombre}">
						<i class="bi bi-person-badge-fill fs-5"></i>
						<span th:text="${usuario.rol.nombre}">ROL</span>
					</span>
				</div>
			</div>
			<!-- Botones de navegación principal -->
			<div class="d-flex flex-row flex-wrap align-items-center gap-3 ms-auto">
				<a class="btn btn-warning fw-bold px-4 py-2 shadow border-0 text-dark d-inline-flex align-items-center gap-2 rounded-3 header-btn"
					th:href="@{/home(view='panelPrincipal')}">
					<i class="bi bi-house-door-fill fs-4"></i> Ir al Menú Principal
				</a>
				<a class="btn btn-danger fw-bold px-4 py-2 text-white d-flex align-items-center gap-2 rounded-3 header-btn"
					href="/logout">
					<i class="bi bi-box-arrow-right fs-4"></i> Cerrar sesión
				</a>
			</div>
		</div>
	</header>
</div>
