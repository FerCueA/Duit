<div th:fragment="headerUsuario">
	<header class="navbar navbar-expand-lg bg-info bg-gradient text-dark border-bottom px-4 py-2 shadow-sm">
		<div class="container-fluid">
			<div class="d-flex align-items-center gap-3">
				<img src="/images/avatarPlaceholder.png" class="rounded-circle border border-3 shadow-sm" width="56"
					height="56" alt="Avatar" />
				<div class="d-flex flex-column justify-content-center">
					<div class="fw-bold d-flex align-items-center gap-2" style="font-size:1.2rem;">
						<i class="bi bi-person-circle text-primary" style="font-size:1.5rem;"></i>
						<span th:text="${usuario.nombre}">Usuario Ejemplo</span>
					</div>
					<div class="d-flex align-items-center gap-2 mt-1">
						<i class="bi bi-envelope text-secondary"></i>
						<span class="text-muted small" th:text="${usuario.email}">usuario@email.com</span>
					</div>
				</div>
			</div>
			<div class="row w-100 align-items-center">

				<div class="col text-center">
					<a class="btn btn-warning fw-bold btn-lg px-4 py-2 shadow border-0 text-dark d-inline-flex align-items-center gap-2"
						style="font-size:1.25rem;" th:href="@{/home(view='panelPrincipal')}">
						<i class="bi bi-house-door-fill" style="font-size:1.5rem;"></i> Ir al Menú Principal
					</a>
				</div>
				<div class="col-auto d-flex align-items-center gap-2">
					<span class="badge bg-primary text-white d-flex align-items-center gap-2 px-3 py-2 shadow"
						style="font-size:1.1rem; font-weight:600; letter-spacing:0.5px;">
						<i class="bi bi-person-badge-fill" style="font-size:1.4rem;"></i>
						<span th:text="${usuario.rol.nombre}" style="text-transform:uppercase;">ROL</span>
					</span>
				</div>
				<div class="col-auto d-flex align-items-center">
					<a class="btn btn-danger fw-bold btn px-3 py-2 text-white d-flex align-items-center gap-2"
						href="/logout">
						<i class="bi bi-box-arrow-right"></i> Cerrar sesión
					</a>
				</div>
			</div>
		</div>
	</header>
</div>
