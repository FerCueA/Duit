<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Enlace al css de estilos personalizados-->
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
    <div class="d-flex">
        <div class="bg-oscuro texto-secundario w-25" style="min-height: 100vh;">
            <div class="p-3">
                <h5 class="text-center texto-claro">Usuario</h5>
                <div class="text-center texto-claro mb-3">
                    <img src="/images/avatarPlaceholder.png" alt="Avatar" class="rounded-circle mb-2"
                        style="width: 100px; height: 100px;">
                    <p><strong>Nombre:</strong> Usuario <i class="bi bi-person"></i></p>
                    <p><strong>Rol:</strong> Trabajador <i class="bi bi-briefcase"></i></p>
                </div>
                <hr>
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link texto-primario" href="#"><i class="bi bi-plus-circle"></i> Añadir
                            Profesión</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link texto-primario" href="#"><i class="bi bi-plus-circle"></i> Añadir Oferta</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link texto-primario" href="#"><i class="bi bi-search"></i> Consultar Ofertas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link texto-primario" href="#"><i class="bi bi-clock-history"></i> Consultar
                            Historial</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link bg-rojo texto-claro" href="#"><i class="bi bi-box-arrow-right"></i> Salir</a>
                    </li>
                </ul>
            </div>
        </div>
        <div class="flex-grow-1 bg-claro texto-oscuro p-4">
            <h1 class="texto-primario">Bienvenido</h1>
            <p class="texto-secundario">Selecciona una opción del menú para continuar.</p>
        </div>
    </div>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
