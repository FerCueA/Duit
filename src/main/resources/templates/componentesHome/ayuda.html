<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Duit | Ayuda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body class="d-flex flex-column min-vh-100">
    <!-- HEADER -->
    <div th:replace="componentes/headerUsuario :: headerUsuario"></div>
    <div class="container-fluid flex-grow-1">
        <div class="row">
            <!-- NAV LATERAL -->
            <div class="col-md-2 p-0 d-flex flex-column justify-content-center align-items-start">
                <div th:replace="componentes/navLateral :: navLateral"></div>
            </div>
            <!-- CONTENIDO -->
            <div class="col-md-10 p-4">
    <h2 class="text-center mb-4"><i class="bi bi-question-circle"></i> Ayuda</h2>
    <div class="card shadow mx-auto">
        <div class="card-body">
            <p class="mb-3">¿Tienes dudas? Consulta nuestras preguntas frecuentes o contacta con soporte.</p>
            <ul class="list-group mb-3">
                <li class="list-group-item"><i class="bi bi-info-circle text-primary me-2"></i> ¿Cómo publico una oferta?</li>
                <li class="list-group-item"><i class="bi bi-pencil text-success me-2"></i> ¿Cómo edito mi perfil?</li>
                <li class="list-group-item"><i class="bi bi-envelope text-warning me-2"></i> ¿Cómo contactar con soporte?</li>
            </ul>
            <div class="alert alert-info text-center">
                <i class="bi bi-envelope-at"></i> Para más ayuda, escribe a <a href="mailto:soporte@duit.com">soporte@duit.com</a>
            </div>
            <div class="mt-4 text-center">
                <a href="#" class="btn btn-outline-primary btn-sm mx-1"><i class="bi bi-book"></i> Ver documentación</a>
                <a href="#" class="btn btn-outline-success btn-sm mx-1"><i class="bi bi-chat-dots"></i> Chat de soporte</a>
            </div>
        </div>
    </div>
            </div>
        </div>
    </div>
    <!-- FOOTER -->
    <div th:replace="componentes/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
</div>
