<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="/css/styles.css" />
</head>

<body>
    <div class="container d-flex justify-content-center align-items-center vh-100 bg-light">
        <div class="card w-100 p-4">
            <div class="p-4">
                <h2 class="text-center mb-4 text-success" id="titulo-registro">
                    <i class="bi bi-person-plus-fill"></i> Registro
                </h2>
                <form method="post" th:action="@{/register}">
                                    <!-- Mensajes de error o éxito -->
                                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                                    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
                    <div class="mb-3">
                        <label for="nombre" class="form-label text-secondary">Nombre</label>
                        <input type="text" class="form-control" id="nombre" name="nombre"
                            placeholder="Introduce tu nombre" required />
                    </div>
                    <div class="mb-3">
                        <label for="apellidos" class="form-label text-secondary">Apellidos</label>
                        <input type="text" class="form-control" id="apellidos" name="apellidos"
                            placeholder="Introduce tus apellidos" required />
                    </div>
                    <div class="mb-3">
                        <label for="username" class="form-label text-secondary">Nombre de usuario</label>
                        <input type="text" class="form-control" id="username" name="username"
                            placeholder="Nombre de usuario" required />
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label text-secondary">Correo electrónico</label>
                        <input type="email" class="form-control" id="email" name="email"
                            placeholder="Introduce tu correo electrónico" required />
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label text-secondary">Contraseña</label>
                        <input type="password" class="form-control" id="password" name="password"
                            placeholder="Introduce tu contraseña" required />
                    </div>
                    <div class="mb-3">
                        <label for="telefono" class="form-label text-secondary">Teléfono</label>
                        <input type="text" class="form-control" id="telefono" name="telefono"
                            placeholder="Introduce tu teléfono" required />
                    </div>
                    <div class="mb-3" id="rol-group">
                        <label for="idRol" class="form-label text-secondary">Rol</label>
                        <select class="form-select" id="idRol" name="idRol" required>
                            <option value="1">Cliente</option>
                            <option value="2">Trabajador</option>
                        </select>
                    </div>
                    <div class="d-flex justify-content-center align-items-center">
                        <button type="submit" class="btn w-100 text-light bg-success">
                            <i class="bi bi-person-plus-fill"></i> Registrarse
                        </button>
                    </div>
                    <div class="d-flex justify-content-center align-items-center mt-3">
                        <a href="/" class="btn btn-outline-primary w-100">
                            <i class="bi bi-house"></i> Volver al Inicio
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    
    <script>
        // Selecciona el rol automáticamente según el parámetro idRol en la URL y oculta el selector si está preseleccionado
        document.addEventListener('DOMContentLoaded', function () {
            const params = new URLSearchParams(window.location.search);
            const idRol = params.get('idRol');
            const selectRol = document.getElementById('idRol');
            const rolGroup = document.getElementById('rol-group');
            const titulo = document.getElementById('titulo-registro');
            if (idRol) {
                selectRol.value = idRol;
                rolGroup.style.display = 'none';
                if (idRol === '1') {
                    titulo.innerHTML = '<i class="bi bi-person-plus-fill"></i> Registrarse como Cliente';
                } else if (idRol === '2') {
                    titulo.innerHTML = '<i class="bi bi-person-plus-fill"></i> Registrarse como Trabajador';
                }
            } else {
                titulo.innerHTML = '<i class="bi bi-person-plus-fill"></i> Registro';
            }
        });
    </script>
    </form>
    </div>
    </div>
    </div>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
