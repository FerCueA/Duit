<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <title>Duit | Tipos de Trabajo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
</head>

<body class="d-flex flex-column min-vh-100">
    <!-- Sección: Encabezado de usuario -->
    <div th:replace="componentes/headerUsuario :: headerUsuario"></div>
    <!-- Sección principal de tipos de trabajo -->
    <div class="container-fluid flex-grow-1 d-flex align-items-center justify-content-center" style="min-height: 80vh">
        <div class="w-100" style="max-width: 900px">
            <!-- Título principal de la sección -->
            <h2 class="text-center mb-4">
                <i class="bi bi-tags"></i> Tipos de Trabajo
            </h2>
            <!-- Card principal de gestión de tipos -->
            <div class="card shadow">
                <div class="card-body">
                 
                    <!-- Gestión de tipos de trabajo -->
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="mb-0">Listado de tipos de trabajo</h5>
                        <button class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#modalNuevoTipo">
                            <i class="bi bi-plus-circle"></i> Añadir nuevo
                        </button>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-bordered align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th><i class="bi bi-briefcase-fill text-secondary"></i> Nombre</th>
                                    <th><i class="bi bi-card-text text-secondary"></i> Descripción</th>
                                    <th class="text-center"><i class="bi bi-gear-fill text-secondary"></i> Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="categoria : ${categorias}">
                                    <td th:text="${categoria.nombre}"></td>
                                    <td th:text="${categoria.descripcion}"></td>
                                    <td class="text-center">
                                        <!-- Botón para abrir modal de edición -->
                                        <button class="btn btn-outline-primary btn-sm me-1" data-bs-toggle="modal" th:attr="data-bs-target='#modalEditarTipo' + ${categoria.idCategoria}" type="button">
                                            <i class="bi bi-pencil"></i> Editar
                                        </button>
                                        <!-- Modal de edición -->
                                        <div class="modal fade" th:id="'modalEditarTipo' + ${categoria.idCategoria}" tabindex="-1" aria-labelledby="modalEditarTipoLabel" aria-hidden="true">
                                            <div class="modal-dialog">
                                                <div class="modal-content">
                                                    <form th:action="@{/tiposTrabajo/editar}" method="post">
                                                        <div class="modal-header">
                                                            <h5 class="modal-title" id="modalEditarTipoLabel">Editar tipo de trabajo</h5>
                                                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                                                        </div>
                                                        <div class="modal-body">
                                                            <input type="hidden" name="idCategoria" th:value="${categoria.idCategoria}" />
                                                            <div class="mb-3">
                                                                <label class="form-label">Nombre</label>
                                                                <input type="text" name="nombre" class="form-control" th:value="${categoria.nombre}" required />
                                                            </div>
                                                            <div class="mb-3">
                                                                <label class="form-label">Descripción</label>
                                                                <textarea name="descripcion" class="form-control" rows="3" th:text="${categoria.descripcion}" required></textarea>
                                                            </div>
                                                        </div>
                                                        <div class="modal-footer">
                                                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                                                            <button type="submit" class="btn btn-primary">Guardar cambios</button>
                                                        </div>
                                                    </form>
                                                </div>
                                            </div>
                                        </div>
                                        <!-- Botón para eliminar -->
                                        <form th:action="@{/tiposTrabajo/eliminar}" method="post" style="display:inline">
                                            <input type="hidden" name="idCategoria" th:value="${categoria.idCategoria}" />
                                            <button type="submit" class="btn btn-outline-danger btn-sm" onclick="return confirm('¿Seguro que deseas eliminar este tipo de trabajo?');">
                                                <i class="bi bi-trash"></i> Eliminar
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <!-- Modal para crear nuevo tipo de trabajo -->
                    <div class="modal fade" id="modalNuevoTipo" tabindex="-1" aria-labelledby="modalNuevoTipoLabel" aria-hidden="true">
                        <div class="modal-dialog">
                            <div class="modal-content">
                                <form th:action="@{/tiposTrabajo/crear}" method="post">
                                    <div class="modal-header">
                                        <h5 class="modal-title" id="modalNuevoTipoLabel">Añadir tipo de trabajo</h5>
                                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                                    </div>
                                    <div class="modal-body">
                                        <div class="mb-3">
                                            <label class="form-label">Nombre</label>
                                            <input type="text" name="nombre" class="form-control" required />
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label">Descripción</label>
                                            <textarea name="descripcion" class="form-control" rows="3" required></textarea>
                                        </div>
                                    </div>
                                    <div class="modal-footer">
                                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                                        <button type="submit" class="btn btn-success">Crear tipo</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                    <!-- Botón de volver al panel -->
                    <div class="mt-4 text-center">
                        <a th:href="@{/home}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left-circle"></i> Volver al panel
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Pie de página -->
    <div th:replace="componentes/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
