<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <title>Duit | Tipos de Trabajo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
</head>

<body class="d-flex flex-column min-vh-100">
    <!-- ENCABEZADO DE USUARIO -->
    <div th:replace="~{componentes/headerUsuario :: headerUsuario}"></div>
    <!-- SECCIÓN PRINCIPAL DE TIPOS DE TRABAJO -->
    <div class="container-fluid flex-grow-1 d-flex align-items-center justify-content-center" style="min-height: 80vh">
        <div class="w-100" style="max-width: 900px">
            <!-- TÍTULO PRINCIPAL DE LA SECCIÓN -->
            <h2 class="text-center mb-4">
                <i class="bi bi-tags"></i> Tipos de Trabajo
            </h2>
            <!-- CARD PRINCIPAL DE TIPOS DE TRABAJO -->
            <div class="card shadow">
                <div class="card-body">

                    <!-- CARD AÑADIR -->
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="mb-0">Listado de tipos de trabajo</h5>
                        <button class="btn btn-success btn-lg rounded-pill px-4 py-2 fw-semibold shadow-sm" data-bs-toggle="modal" data-bs-target="#modalNuevoTipo">
                            <i class="bi bi-plus-circle"></i> Añadir nuevo
                        </button>
                    </div>

                     <!-- CARD BUSCAR -->
                    <form class="mb-3" th:action="@{/tiposTrabajo}" method="get">
                        <div class="input-group input-group-lg">
                            <span class="input-group-text bg-primary text-white"><i class="bi bi-search"></i></span>
                            <input type="text" class="form-control" name="filtro" th:value="${filtro}"
                                placeholder="Buscar tipo de trabajo, nombre o descripción...">
                            <button class="btn btn-primary" type="submit">Buscar</button>
                        </div>
                    </form>
                    <!-- TABLA DE TIPOS DE TRABAJO -->
                    <div class="table-responsive">
                        <table class="table table-bordered align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th><i class="bi bi-briefcase-fill text-secondary"></i> Nombre</th>
                                    <th><i class="bi bi-card-text text-secondary"></i> Descripción</th>
                                    <th class="text-center"><i class="bi bi-gear-fill text-secondary"></i> Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- FILA DE CATEGORÍA -->
                                <tr th:each="categoria : ${categorias}">
                                    <!-- NOMBRE CATEGORÍA -->
                                    <td th:text="${categoria.nombre}"></td>
                                    <!-- DESCRIPCIÓN CATEGORÍA -->
                                    <td th:text="${categoria.descripcion}"></td>
                                    <!-- ACCIONES CATEGORÍA -->
                                    <td class="text-center">
                                        <!-- BOTÓN EDITAR -->
                                        <button class="btn btn-outline-primary btn-sm me-1" data-bs-toggle="modal"
                                            th:attr="data-bs-target='#modalEditarTipo' + ${categoria.idCategoria}"
                                            type="button">
                                            <i class="bi bi-pencil"></i> Editar
                                        </button>
                                        <!-- MODAL EDITAR TIPO -->
                                        <div class="modal fade" th:id="'modalEditarTipo' + ${categoria.idCategoria}"
                                            tabindex="-1" aria-labelledby="modalEditarTipoLabel" aria-hidden="true">
                                            <div class="modal-dialog">
                                                <div class="modal-content">
                                                    <!-- FORMULARIO EDITAR TIPO -->
                                                    <form th:action="@{/tiposTrabajo/editar}" method="post">
                                                        <div class="modal-header">
                                                            <h5 class="modal-title" id="modalEditarTipoLabel">Editar
                                                                tipo de trabajo</h5>
                                                            <button type="button" class="btn-close"
                                                                data-bs-dismiss="modal" aria-label="Cerrar"></button>
                                                        </div>
                                                        <div class="modal-body">
                                                            <input type="hidden" name="idCategoria"
                                                                th:value="${categoria.idCategoria}" />
                                                            <div class="mb-3">
                                                                <label class="form-label">Nombre</label>
                                                                <input type="text" name="nombre" class="form-control"
                                                                    th:value="${categoria.nombre}" required />
                                                            </div>
                                                            <div class="mb-3">
                                                                <label class="form-label">Descripción</label>
                                                                <textarea name="descripcion" class="form-control"
                                                                    rows="3" th:text="${categoria.descripcion}"
                                                                    required></textarea>
                                                            </div>
                                                        </div>
                                                        <div class="modal-footer">
                                                            <button type="button" class="btn btn-secondary"
                                                                data-bs-dismiss="modal">Cancelar</button>
                                                            <button type="submit" class="btn btn-primary">Guardar
                                                                cambios</button>
                                                        </div>
                                                    </form>
                                                </div>
                                            </div>
                                        </div>
                                        <!-- FORMULARIO ELIMINAR TIPO -->
                                        <form th:action="@{/tiposTrabajo/eliminar}" method="post"
                                            style="display:inline">
                                            <input type="hidden" name="idCategoria"
                                                th:value="${categoria.idCategoria}" />
                                            <button type="submit" class="btn btn-outline-danger btn-sm"
                                                onclick="return confirm('¿Seguro que deseas eliminar este tipo de trabajo?');">
                                                <i class="bi bi-trash"></i> Eliminar
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <!-- MODAL NUEVO TIPO -->
                    <div class="modal fade" id="modalNuevoTipo" tabindex="-1" aria-labelledby="modalNuevoTipoLabel"
                        aria-hidden="true">
                        <div class="modal-dialog">
                            <div class="modal-content">
                                <!-- FORMULARIO NUEVO TIPO -->
                                <form th:action="@{/tiposTrabajo/crear}" method="post">
                                    <div class="modal-header">
                                        <h5 class="modal-title" id="modalNuevoTipoLabel">Añadir tipo de trabajo</h5>
                                        <button type="button" class="btn-close" data-bs-dismiss="modal"
                                            aria-label="Cerrar"></button>
                                    </div>
                                    <div class="modal-body">
                                        <div class="mb-3">
                                            <label class="form-label">Nombre</label>
                                            <input type="text" name="nombre" class="form-control" required />
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label">Descripción</label>
                                            <textarea name="descripcion" class="form-control" rows="3"
                                                required></textarea>
                                        </div>
                                    </div>
                                    <div class="modal-footer">
                                        <button type="button" class="btn btn-secondary"
                                            data-bs-dismiss="modal">Cancelar</button>
                                        <button type="submit" class="btn btn-success">Crear tipo</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                    <!-- BOTÓN VOLVER AL PANEL -->
                    <div class="mt-4 text-center">
                        <a th:href="@{/home}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left-circle"></i> Volver al panel
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- PIE DE PÁGINA -->
    <div th:replace="~{componentes/footer :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
