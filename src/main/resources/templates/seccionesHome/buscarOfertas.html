<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Duit | Buscar Ofertas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body class="d-flex flex-column min-vh-100">
    <!-- ENCABEZADO USUARIO -->
    <div th:replace="~{componentes/headerUsuario :: headerUsuario}"></div>
    <div class="container-fluid flex-grow-1 d-flex align-items-center justify-content-center" style="min-height:80vh;">
        <div class="w-100" style="max-width:900px;">
            <!-- TÍTULO PRINCIPAL -->
            <h2 class="text-center mb-4"><i class="bi bi-search"></i> Buscar Ofertas</h2>
            <!-- BUSCADOR (no funcional) -->
            <div class="card shadow border-0 mb-4 mx-auto" style="max-width:700px;">
                <div class="card-body p-4">
                    <form>
                        <div class="row g-3 align-items-end">
                            <div class="col-md-5">
                                <label class="form-label fw-bold"><i class="bi bi-tags"></i> Tipo</label>
                                <select class="form-select" disabled>
                                    <option value="">Todos</option>
                                    <option th:each="cat : ${categorias}" th:value="${cat.idCategoria}"
                                        th:text="${cat.nombre}"></option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold"><i class="bi bi-geo-alt"></i> Código Postal</label>
                                <input type="text" class="form-control" placeholder="Ej: 35001" disabled />
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold"><i class="bi bi-search"></i> Palabra clave</label>
                                <input type="text" class="form-control" placeholder="Ej: limpieza, fontanero..."
                                    disabled />
                            </div>
                        </div>
                        <div class="mt-4 text-end">
                            <button type="button" class="btn btn-primary px-4" disabled><i class="bi bi-search"></i>
                                Buscar</button>
                        </div>
                    </form>
                </div>
            </div>
            <!-- RESULTADOS DE OFERTAS -->
            <div class="mx-auto mt-4 p-4 bg-white rounded-3 shadow border" style="max-width:800px;">
                <h4 class="mb-4 text-center"><i class="bi bi-list-ul"></i> Resultados de la búsqueda:</h4>
                <div th:if="${ofertas != null and !ofertas.isEmpty()}" class="row g-4">
                    <div th:each="oferta : ${ofertas}" class="col-md-12">
                        <div class="card mb-3 border-0 shadow-sm">
                            <div
                                class="card-body d-flex flex-column flex-md-row justify-content-between align-items-md-center">
                                <div>
                                    <h5 class="card-title mb-1 fw-bold" th:text="${oferta.titulo}"></h5>
                                    <p class="mb-0">
                                        <span class="fw-semibold">Categoría:</span> <span
                                            th:text="${oferta.categoria != null ? oferta.categoria.nombre : oferta.idCategoria}"></span>
                                        <span class="fw-semibold ms-3">Estado:</span> <span
                                            th:text="${oferta.estado}"></span>
                                    </p>
                                    <small class="text-muted">Descripción: <span
                                            th:text="${oferta.descripcion}"></span></small>
                                </div>
                                <div class="text-end">
                                    <button class="btn btn-outline-info btn-sm mt-2" data-bs-toggle="modal"
                                        th:attr="data-bs-target='#modalUnico__' + ${oferta.idSolicitud}"><i
                                            class="bi bi-eye"></i> Ver detalles / Postularse</button>
                                </div>
                            </div>
                        </div>
                        <!-- MODAL DETALLES Y POSTULACION -->
                        <div class="modal fade" th:id="'modalUnico__' + ${oferta.idSolicitud}" tabindex="-1"
                            th:attr="aria-labelledby='modalUnicoLabel__' + ${oferta.idSolicitud}" aria-hidden="true">
                            <div class="modal-dialog modal-lg modal-dialog-centered">
                                <div class="modal-content">
                                    <div class="modal-header bg-primary text-white">
                                        <h5 class="modal-title" th:id="'modalUnicoLabel__' + ${oferta.idSolicitud}"><i
                                                class="bi bi-info-circle me-2"></i>Detalles de la Solicitud y
                                            Postulación</h5>
                                        <button type="button" class="btn-close" data-bs-dismiss="modal"
                                            aria-label="Cerrar"></button>
                                    </div>
                                    <form th:action="@{/postulaciones/crear}" method="post">
                                        <div class="modal-body">
                                            <h4 class="mb-2" th:text="${oferta.titulo}"></h4>
                                            <p><strong>Categoría:</strong> <span
                                                    th:text="${oferta.categoria != null ? oferta.categoria.nombre : oferta.idCategoria}"></span>
                                            </p>
                                            <p><strong>Estado:</strong> <span th:text="${oferta.estado}"></span></p>
                                            <p><strong>Descripción:</strong> <span
                                                    th:text="${oferta.descripcion}"></span></p>
                                            <p><strong>Fecha de solicitud:</strong> <span
                                                    th:text="${#dates.format(oferta.fechaSolicitud, 'dd/MM/yyyy HH:mm')}"></span>
                                            </p>
                                            <p><strong>ID Cliente:</strong> <span th:text="${oferta.idCliente}"></span>
                                            </p>
                                            <hr>
                                            <input type="hidden" name="idSolicitud" th:value="${oferta.idSolicitud}" />
                                            <div class="mb-3">
                                                <label class="form-label fw-bold">Mensaje para el cliente</label>
                                                <textarea name="mensaje" class="form-control" rows="3"
                                                    placeholder="Escribe tu mensaje..." required></textarea>
                                            </div>
                                            <div class="mb-3">
                                                <label class="form-label fw-bold">Precio propuesto (€)</label>
                                                <input type="number" name="precioPropuesto" class="form-control" min="0"
                                                    step="0.01" placeholder="Ej: 50.00" required />
                                            </div>
                                        </div>
                                        <div class="modal-footer">
                                            <button type="button" class="btn btn-outline-secondary"
                                                data-bs-dismiss="modal">Cancelar</button>
                                            <button type="submit" class="btn btn-success">Enviar postulación</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div th:if="${ofertas == null or ofertas.isEmpty()}" class="alert alert-info text-center my-4">
                    <i class="bi bi-info-circle"></i> No hay ofertas disponibles en este momento.
                </div>
            </div>
            <div class="mt-4 text-center">
                <a th:href="@{/home}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Volver al
                    panel</a>
            </div>
        </div>
    </div>
    <!-- PIE DE PÁGINA -->
    <div th:replace="~{componentes/footer :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
