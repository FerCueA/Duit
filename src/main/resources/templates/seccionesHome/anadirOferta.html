<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Duit | Añadir Oferta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body class="d-flex flex-column min-vh-100">
    <!-- Sección: Encabezado de usuario -->
    <div th:replace="componentes/headerUsuario :: headerUsuario"></div>
    <div class="container-fluid flex-grow-1 bg-light py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                <div class="card border-0 shadow-lg rounded-4">
                    <div class="card-body p-4">
                        <!-- Título y descripción de la sección -->
                        <div class="text-center mb-4">
                            <span class="d-inline-block bg-success bg-opacity-10 rounded-circle p-3 mb-2">
                                <i class="bi bi-plus-circle fs-1 text-success"></i>
                            </span>
                            <h2 class="fw-bold mb-0">Nueva Oferta</h2>
                            <small class="text-muted">Publica una nueva oportunidad de trabajo</small>
                        </div>
                        <!-- Modal de confirmación de oferta publicada -->
                        <div class="modal fade" id="modalOfertaPublicada" tabindex="-1"
                            aria-labelledby="modalOfertaPublicadaLabel" aria-hidden="true">
                            <div class="modal-dialog modal-dialog-centered">
                                <div class="modal-content">
                                    <div class="modal-header bg-success bg-opacity-10 border-0">
                                        <h5 class="modal-title fw-bold text-success" id="modalOfertaPublicadaLabel"><i
                                                class="bi bi-check-circle-fill"></i> Oferta publicada</h5>
                                        <button type="button" class="btn-close" data-bs-dismiss="modal"
                                            aria-label="Cerrar"></button>
                                    </div>
                                    <div class="modal-body text-center">
                                        ¡Oferta publicada correctamente!
                                    </div>
                                    <div class="modal-footer border-0 justify-content-center">
                                        <button type="button" class="btn btn-success px-4"
                                            data-bs-dismiss="modal">Aceptar</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!-- Formulario para añadir nueva oferta -->
                        <form id="formOferta" autocomplete="off">
                            <!-- Campos del formulario -->
                            <div class="row g-3">
                                <div class="col-12">
                                    <label class="form-label"><i class="bi bi-type fs-5 text-primary"></i>
                                        Título</label>
                                    <input type="text" name="titulo" class="form-control"
                                        placeholder="Ej: Limpieza de oficina" required />
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label"><i class="bi bi-calendar-date fs-5 text-primary"></i>
                                        Fecha publicación</label>
                                    <input type="date" name="fecha" class="form-control" value="2025-12-29" required />
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label"><i class="bi bi-tags fs-5 text-primary"></i> Tipo</label>
                                    <select name="tipo" class="form-select" required>
                                        <option value="">Selecciona un tipo</option>
                                        <option value="Limpieza">Limpieza</option>
                                        <option value="Reparaciones">Reparaciones</option>
                                        <option value="Jardinería">Jardinería</option>
                                        <option value="Informática">Informática</option>
                                        <option value="Otro">Otro</option>
                                    </select>
                                </div>
                                <div class="col-12">
                                    <label class="form-label"><i class="bi bi-card-text fs-5 text-primary"></i>
                                        Descripción</label>
                                    <textarea name="descripcion" class="form-control" rows="3"
                                        placeholder="Describe la oferta..." required></textarea>
                                </div>
                            </div>
                            <!-- Separador visual -->
                            <hr class="my-4">
                            <!-- Botón para publicar oferta -->
                            <div class="mt-3 text-end">
                                <button type="submit" class="btn btn-success px-4"><i class="bi bi-plus-circle"></i>
                                    Publicar</button>
                            </div>
                        </form>
                        <!-- Script para mostrar el modal de éxito y limpiar el formulario -->
                        <script>
                            document.getElementById('formOferta').addEventListener('submit', function (e) {
                                e.preventDefault();
                                var modal = new bootstrap.Modal(document.getElementById('modalOfertaPublicada'));
                                modal.show();
                                document.getElementById('formOferta').reset();
                            });
                        </script>
                    </div>
                </div>
            </div>
        </div>
        <div class="mt-4 text-center">
            <a th:href="@{/home}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Volver al panel</a>
        </div>
    </div>
    <!-- Pie de página -->
    <div class="mt-auto" th:replace="componentes/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
