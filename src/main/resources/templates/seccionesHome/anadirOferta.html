<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Duit | Añadir Oferta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body class="d-flex flex-column min-vh-100">
    <!-- HEADER -->
    <div th:replace="componentes/headerUsuario :: headerUsuario"></div>
    <div class="container-fluid flex-grow-1">
        <div class="row" style="min-height: 70vh;">

            <div class="container d-flex flex-column align-items-center justify-content-center flex-grow-1"
                style="min-height: 70vh;">
                <div class="w-100" style="max-width:600px;">
                    <div class="col-md-10 p-4">
                        <h2 class="text-center mb-4"><i class="bi bi-plus-circle"></i> Nueva Oferta</h2>
                        <div class="card shadow mx-auto" style="max-width:600px;">
                            <div class="card-body">
                                <form>
                                    <div class="row g-3">
                                        <div class="col-md-8">
                                            <label class="form-label"><i class="bi bi-type"></i> Título</label>
                                            <input type="text" name="titulo" class="form-control"
                                                placeholder="Ej: Limpieza de oficina" required />
                                        </div>
                                        <div class="col-md-4">
                                            <label class="form-label"><i class="bi bi-calendar-date"></i> Fecha
                                                publicación</label>
                                            <input type="date" name="fecha" class="form-control" value="2025-12-29"
                                                required />
                                        </div>
                                        <div class="col-12">
                                            <label class="form-label"><i class="bi bi-card-text"></i>
                                                Descripción</label>
                                            <textarea name="descripcion" class="form-control" rows="3"
                                                placeholder="Describe la oferta..." required></textarea>
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label"><i class="bi bi-tags"></i> Tipo</label>
                                            <select name="tipo" class="form-select" required>
                                                <option value="">Selecciona un tipo</option>
                                                <option value="Limpieza">Limpieza</option>
                                                <option value="Reparaciones">Reparaciones</option>
                                                <option value="Jardinería">Jardinería</option>
                                                <option value="Informática">Informática</option>
                                                <option value="Otro">Otro</option>
                                            </select>
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label"><i class="bi bi-currency-euro"></i> Precio
                                                (€)</label>
                                            <input type="number" name="precio" min="0" step="0.01" class="form-control"
                                                placeholder="Ej: 30" required />
                                        </div>
                                        <div class="col-md-4">
                                            <label class="form-label"><i class="bi bi-geo-alt"></i> Código
                                                Postal</label>
                                            <input type="text" name="cp" class="form-control" placeholder="Ej: 35001"
                                                required />
                                        </div>
                                        <div class="col-md-8">
                                            <label class="form-label"><i class="bi bi-geo"></i> Dirección</label>
                                            <input type="text" name="direccion" class="form-control"
                                                placeholder="Ej: Calle Ejemplo 123" required />
                                        </div>
                                    </div>
                                    <div class="mt-4 text-end">
                                        <button type="submit" class="btn btn-success px-4"><i
                                                class="bi bi-plus-circle"></i> Publicar</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- FOOTER -->
        <div th:replace="componentes/footer :: footer"></div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
</div>
