<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <title>Duit | Estadísticas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
</head>

<body class="d-flex flex-column min-vh-100">
    <!-- ENCABEZADO DE USUARIO -->
    <div th:replace="~{componentes/headerUsuario :: headerUsuario}"></div>
    <!-- SECCIÓN PRINCIPAL DE ESTADÍSTICAS -->
    <div class="container-fluid flex-grow-1 d-flex align-items-center justify-content-center" style="min-height: 80vh">
        <div class="w-100" style="max-width: 900px">
            <!-- TÍTULO PRINCIPAL DE LA SECCIÓN -->
            <h2 class="text-center mb-4">
                <i class="bi bi-bar-chart-line"></i> Estadísticas
            </h2>
            <!-- CARD PRINCIPAL DE ESTADÍSTICAS -->
            <div class="card shadow mb-4">
                <div class="card-body">
                    <h5 class="card-title fw-bold">Resumen de la plataforma</h5>
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            Usuarios registrados
                            <span class="badge bg-primary rounded-pill">72</span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            Ofertas publicadas
                            <span class="badge bg-success rounded-pill">--</span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            Tipos de trabajo
                            <span class="badge bg-warning rounded-pill">--</span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            Valoraciones totales
                            <span class="badge bg-info rounded-pill">--</span>
                        </li>
                    </ul>
                    <p class="mt-3 text-muted">* Los datos se actualizarán próximamente.</p>
                </div>
            </div>
            <!-- CARD DE GRÁFICOS Y TENDENCIAS -->
            <div class="card shadow">
                <div class="card-body">
                    <h5 class="card-title fw-bold">Gráficos y tendencias</h5>
                    <div class="text-center">
                        <i class="bi bi-graph-up-arrow fs-1 text-secondary"></i>
                        <p class="mt-2">Próximamente se mostrarán gráficos de actividad y tendencias.</p>
                    </div>
                </div>
            </div>
            <!-- BOTÓN VOLVER AL PANEL -->
            <div class="mt-4 text-center">
                <a th:href="@{/home}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Volver al
                    panel</a>
            </div>
        </div>
    </div>
    <!-- PIE DE PÁGINA -->
    <div th:replace="~{componentes/footer :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
