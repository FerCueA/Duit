<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <title>Duit | Estadísticas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
</head>

<body class="d-flex flex-column min-vh-100">
    <!-- Sección: Encabezado de usuario -->
    <div th:replace="componentes/headerUsuario :: headerUsuario"></div>
    <!-- Sección principal de estadísticas -->
    <div class="container-fluid flex-grow-1 d-flex align-items-center justify-content-center" style="min-height: 80vh">
        <div class="w-100" style="max-width: 900px">
            <!-- Título principal de la sección -->
            <h2 class="text-center mb-4">
                <i class="bi bi-bar-chart-line"></i> Estadísticas
            </h2>
            <!-- Card principal de estadísticas -->
            <div class="card shadow">
                <div class="card-body">
                    
                    <!-- Estadísticas visuales con Bootstrap -->
                    <div class="row g-4 justify-content-center">
                        <div class="col-md-4">
                            <div class="card border-info h-100">
                                <div class="card-body text-center">
                                    <i class="bi bi-people-fill display-4 text-info mb-2"></i>
                                    <h5 class="card-title">Usuarios registrados</h5>
                                    <p class="fs-2 fw-bold mb-0">128</p>
                                    <span class="text-success"><i class="bi bi-arrow-up"></i> +12 este mes</span>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card border-success h-100">
                                <div class="card-body text-center">
                                    <i class="bi bi-briefcase-fill display-4 text-success mb-2"></i>
                                    <h5 class="card-title">Ofertas publicadas</h5>
                                    <p class="fs-2 fw-bold mb-0">54</p>
                                    <span class="text-danger"><i class="bi bi-arrow-down"></i> -3 este mes</span>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card border-warning h-100">
                                <div class="card-body text-center">
                                    <i class="bi bi-star-fill display-4 text-warning mb-2"></i>
                                    <h5 class="card-title">Valoraciones recibidas</h5>
                                    <p class="fs-2 fw-bold mb-0">230</p>
                                    <span class="text-success"><i class="bi bi-arrow-up"></i> +21 este mes</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <hr class="my-4">
                    <div class="row justify-content-center">
                        <div class="col-md-8">
                            <div class="card border-light">
                                <div class="card-body">
                                    <h5 class="card-title mb-3"><i class="bi bi-pie-chart-fill text-primary"></i> Distribución de tipos de trabajo</h5>
                                    <div class="d-flex justify-content-around align-items-center">
                                        <div class="text-center">
                                            <i class="bi bi-tools text-info fs-3"></i>
                                            <div class="fw-bold">Fontanería</div>
                                            <span class="badge bg-info">30%</span>
                                        </div>
                                        <div class="text-center">
                                            <i class="bi bi-lightbulb-fill text-warning fs-3"></i>
                                            <div class="fw-bold">Electricidad</div>
                                            <span class="badge bg-warning text-dark">25%</span>
                                        </div>
                                        <div class="text-center">
                                            <i class="bi bi-broom text-success fs-3"></i>
                                            <div class="fw-bold">Limpieza</div>
                                            <span class="badge bg-success">45%</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- Fin estadísticas visuales -->
                </div>
            </div>
        </div>
    </div>
    <!-- Pie de página -->
    <div th:replace="componentes/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
