<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <title>Duit | Estadísticas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
</head>

<body class="d-flex flex-column min-vh-100">
    <!-- Sección: Encabezado de usuario -->
    <div th:replace="componentes/headerUsuario :: headerUsuario"></div>
    <!-- Sección principal de estadísticas -->
    <div class="container-fluid flex-grow-1 d-flex align-items-center justify-content-center" style="min-height: 80vh">
        <div class="w-100" style="max-width: 900px">
            <!-- Título principal de la sección -->
            <h2 class="text-center mb-4">
                <i class="bi bi-bar-chart-line"></i> Estadísticas
            </h2>
            <!-- Card principal de estadísticas -->
            <div class="card shadow">
                <div class="card-body">
                    <!-- Estadísticas visuales con Bootstrap -->
                    <div class="row g-4 justify-content-center">
                        <div class="col-md-6">
                            <div class="card border-info h-100">
                                <div class="card-body">
                                    <i class="bi bi-people-fill display-4 text-info mb-2 d-block text-center"></i>
                                    <h5 class="card-title text-center">Usuarios registrados</h5>
                                    <ul class="list-group list-group-flush mt-3">
                                        <li class="list-group-item d-flex justify-content-between align-items-center">
                                            <span><i class="bi bi-person-badge text-primary"></i> Trabajadores</span>
                                            <span class="badge bg-info rounded-pill">72</span>
                                        </li>
                                        <li class="list-group-item d-flex justify-content-between align-items-center">
                                            <span><i class="bi bi-person text-success"></i> Clientes</span>
                                            <span class="badge bg-info rounded-pill">56</span>
                                        </li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="card border-success h-100">
                                <div class="card-body">
                                    <i class="bi bi-briefcase-fill display-4 text-success mb-2 d-block text-center"></i>
                                    <h5 class="card-title text-center">Ofertas por tipo</h5>
                                    <ul class="list-group list-group-flush mt-3">
                                        <li class="list-group-item d-flex justify-content-between align-items-center">
                                            <span><i class="bi bi-briefcase text-secondary"></i> Fontanería</span>
                                            <span class="badge bg-success rounded-pill">18</span>
                                        </li>
                                        <li class="list-group-item d-flex justify-content-between align-items-center">
                                            <span><i class="bi bi-briefcase text-secondary"></i> Electricidad</span>
                                            <span class="badge bg-success rounded-pill">22</span>
                                        </li>
                                      
                                    </ul>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="card border-warning h-100">
                                <div class="card-body">
                                    <i class="bi bi-bar-chart-fill display-4 text-warning mb-2 d-block text-center"></i>
                                    <h5 class="card-title text-center">Porcentaje de ofertas por estado</h5>
                                    <ul class="list-group list-group-flush mt-3">
                                        <li class="list-group-item d-flex justify-content-between align-items-center">
                                            <span><i class="bi bi-hourglass-split text-secondary"></i> En proceso</span>
                                            <span class="badge bg-warning text-dark rounded-pill">40%</span>
                                        </li>
                                        <li class="list-group-item d-flex justify-content-between align-items-center">
                                            <span><i class="bi bi-check-circle-fill text-success"></i> Completadas</span>
                                            <span class="badge bg-success rounded-pill">50%</span>
                                        </li>
                                        <li class="list-group-item d-flex justify-content-between align-items-center">
                                            <span><i class="bi bi-x-circle-fill text-danger"></i> Canceladas</span>
                                            <span class="badge bg-danger rounded-pill">10%</span>
                                        </li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="card border-primary h-100">
                                <div class="card-body">
                                    <i class="bi bi-geo-alt-fill display-4 text-primary mb-2 d-block text-center"></i>
                                    <h5 class="card-title text-center">Ofertas por código postal</h5>
                                    <ul class="list-group list-group-flush mt-3">
                                        <li class="list-group-item d-flex justify-content-between align-items-center">
                                            <span><i class="bi bi-geo text-secondary"></i> 28001</span>
                                            <span class="badge bg-primary rounded-pill">12</span>
                                        </li>
                                        <li class="list-group-item d-flex justify-content-between align-items-center">
                                            <span><i class="bi bi-geo text-secondary"></i> 28002</span>
                                            <span class="badge bg-primary rounded-pill">8</span>
                                        </li>
                                        <li class="list-group-item d-flex justify-content-between align-items-center">
                                            <span><i class="bi bi-geo text-secondary"></i> 28003</span>
                                            <span class="badge bg-primary rounded-pill">15</span>
                                        </li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
               
                </div>
            </div>
        </div>
    </div>
    <!-- Pie de página -->
    <div th:replace="componentes/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
