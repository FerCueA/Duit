<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Duit | Valoraciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body class="d-flex flex-column min-vh-100">
    <!-- HEADER -->
    <div th:replace="componentes/headerUsuario :: headerUsuario"></div>
    <div class="container-fluid flex-grow-1 d-flex align-items-center justify-content-center bg-light py-5">
        <div class="w-100" style="max-width:700px;">

            <div class="card border-0 shadow-lg mx-auto rounded-4 mb-4">
                <div class="card-body">
                    <div class="d-flex align-items-center justify-content-between mb-3">
                        <span class="fw-bold">Valoración media:</span>
                        <span class="fs-4">
                            <span class="badge bg-warning text-dark">4.4 <i class="bi bi-star-fill"></i></span>
                        </span>
                    </div>
                    <hr>
                    <h6 class="mb-3">Últimas 5 valoraciones</h6>
                    <div class="row g-3">
                        <div class="col-12">
                            <div class="card border-0 shadow-sm">
                                <div class="card-body d-flex align-items-center">
                                    <img src="/images/avatarPlaceholder.png" alt="Usuario" class="rounded-circle me-3" width="48" height="48">
                                    <div class="flex-grow-1">
                                        <span class="fw-bold">Juan Pérez</span>
                                        <span class="badge bg-light text-secondary ms-2">28/12/2025</span><br>
                                        <span class="text-warning">
                                            <i class="bi bi-star-fill"></i>
                                            <i class="bi bi-star-fill"></i>
                                            <i class="bi bi-star-fill"></i>
                                            <i class="bi bi-star-fill"></i>
                                            <i class="bi bi-star-fill"></i>
                                        </span>
                                        <span class="ms-2">Excelente servicio</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="card border-0 shadow-sm">
                                <div class="card-body d-flex align-items-center">
                                    <img src="/images/avatarPlaceholder.png" alt="Usuario" class="rounded-circle me-3" width="48" height="48">
                                    <div class="flex-grow-1">
                                        <span class="fw-bold">María López</span>
                                        <span class="badge bg-light text-secondary ms-2">25/12/2025</span><br>
                                        <span class="text-warning">
                                            <i class="bi bi-star-fill"></i>
                                            <i class="bi bi-star-fill"></i>
                                            <i class="bi bi-star-fill"></i>
                                            <i class="bi bi-star-fill"></i>
                                        </span>
                                        <span class="ms-2">Muy profesional</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="card border-0 shadow-sm">
                                <div class="card-body d-flex align-items-center">
                                    <img src="/images/avatarPlaceholder.png" alt="Usuario" class="rounded-circle me-3" width="48" height="48">
                                    <div class="flex-grow-1">
                                        <span class="fw-bold">Carlos Ruiz</span>
                                        <span class="badge bg-light text-secondary ms-2">22/12/2025</span><br>
                                        <span class="text-warning">
                                            <i class="bi bi-star-fill"></i>
                                            <i class="bi bi-star-fill"></i>
                                            <i class="bi bi-star-fill"></i>
                                            <i class="bi bi-star-fill"></i>
                                        </span>
                                        <span class="ms-2">Servicio rápido</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- FOOTER -->
    <div th:replace="componentes/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</html>
</div>
