<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Duit | Mis Ofertas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body class="d-flex flex-column min-vh-100">
    <!-- Sección: Encabezado de usuario -->
    <div th:replace="~{componentes/headerUsuario :: headerUsuario}"></div>
    <div class="container-fluid flex-grow-1 d-flex align-items-center justify-content-center" style="min-height:80vh;">
        <div class="w-100" style="max-width:800px;">
            <!-- Título principal de la página de ofertas del usuario -->
            <h2 class="mb-4 text-center">Mis Ofertas</h2>
            <!-- Cards de ofertas del usuario -->
            <div class="row g-4">
                <!-- Cards horizontales de ofertas propias -->
                <div th:if="${ofertasPropias != null and !ofertasPropias.isEmpty()}" class="d-flex flex-column gap-4">
                    <div th:each="oferta : ${ofertasPropias}" class="card mb-3 shadow-lg border-3 rounded-4 flex-row">
                        <div class="card-body d-flex flex-row align-items-center w-100">
                            <div class="me-4 d-flex flex-column align-items-center justify-content-center">
                                <i class="bi bi-file-earmark-text-fill text-secondary" style="font-size:2.5rem;"></i>
                                <span th:text="${oferta.estado}" class="badge bg-warning text-dark mt-2"
                                    style="font-size:1rem;"></span>
                            </div>
                            <div class="flex-grow-1">
                                <h5 class="card-title mb-2 fw-bold" th:text="${oferta.titulo}"></h5>
                                <div class="mb-2">
                                    <span class="fw-semibold text-secondary">Categoría:</span>
                                    <span class="text-dark ms-2" th:text="${oferta.idCategoria}"></span>
                                </div>
                                <div class="mb-2">
                                    <span class="fw-semibold text-secondary">Descripción:</span>
                                    <span class="text-dark ms-2" th:text="${oferta.descripcion}"></span>
                                </div>
                                <div class="mb-2">
                                    <span class="fw-semibold text-secondary">Fecha publicación:</span>
                                    <span class="text-dark ms-2"
                                        th:text="${#dates.format(oferta.fechaSolicitud, 'dd/MM/yyyy HH:mm')}"></span>
                                </div>
                                <div class="mb-2">

                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div th:if="${ofertasPropias == null or ofertasPropias.isEmpty()}" class="text-center w-100">
                    <div class="alert alert-info mt-4">No tienes ofertas publicadas.</div>
                </div>
            </div>
            <!-- Botón para volver al panel -->
            <div class="mt-4 text-center">
                <a th:href="@{/home}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left-circle me-1"></i> Volver al panel
                </a>
            </div>
        </div>
    </div>
    <!-- Pie de página -->
    <div th:replace="~{componentes/footer :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
