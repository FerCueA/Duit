<div th:fragment="errorView">
    <div class="d-flex justify-content-center align-items-center"
        style="min-height:60vh; background: linear-gradient(135deg, #f8fafc 0%, #fee2e2 100%);">
        <div class="card border-0 shadow-lg p-5 rounded-4 text-center" style="max-width: 420px; width:100%;">
            <div class="mb-3">
                <i class="bi bi-exclamation-triangle-fill text-danger"
                    style="font-size:3rem; animation: shake 0.7s;"></i>
            </div>
            <h4 class="fw-bold mb-2 text-danger">¡Componente no encontrado!</h4>
            <p class="mb-4 text-secondary">El componente solicitado no existe o no está disponible.<br>Verifica la
                dirección o regresa al inicio.</p>
            <a th:href="@{/home(view='buscarOfertas')}" class="btn btn-danger btn-lg px-4 shadow-sm">
                <i class="bi bi-arrow-left-circle"></i> Volver al inicio
            </a>
        </div>
    </div>
</div>
