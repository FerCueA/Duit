<div th:fragment="errorView">
    <div class="d-flex justify-content-center align-items-center bg-light" style="min-height:60vh;">
        <div class="card border-danger shadow-lg p-5 rounded-4 text-center w-100" style="max-width: 420px;">
            <div class="mb-3">
                <span class="d-inline-block bg-danger bg-opacity-10 rounded-circle p-3">
                    <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size:3rem;"></i>
                </span>
            </div>
            <h4 class="fw-bold mb-2 text-danger">¡Ups! Algo salió mal</h4>
            <p class="mb-4 text-secondary">No se pudo encontrar el componente solicitado.<br>Por favor verifica la dirección o vuelve al inicio.</p>
            <a th:href="@{/home(view='panelPrincipal')}" class="btn btn-outline-danger btn-lg px-4 shadow-sm">
                <i class="bi bi-arrow-left-circle me-2"></i> Volver al inicio
            </a>
        </div>
    </div>
</div>
