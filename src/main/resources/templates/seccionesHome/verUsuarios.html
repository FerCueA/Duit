<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <title>Duit | Ver Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
</head>

<body class="d-flex flex-column min-vh-100">
    <!-- Sección: Encabezado de usuario -->
    <div th:replace="componentes/headerUsuario :: headerUsuario"></div>
    <!-- Sección principal de usuarios registrados -->
    <div class="container-fluid flex-grow-1 d-flex align-items-center justify-content-center" style="min-height: 80vh">
        <div class="w-100" style="max-width: 900px">
            <!-- Título principal de la sección -->
            <h2 class="text-center mb-4">
                <i class="bi bi-people"></i> Usuarios Registrados
            </h2>
            <!-- Card principal de usuarios -->
            <div class="card shadow">
                <div class="card-body">
                    <!-- Buscador de usuarios -->
                    <form class="mb-3" th:action="@{/verUsuarios}" method="get">
                        <div class="input-group input-group-lg">
                            <span class="input-group-text bg-primary text-white"><i class="bi bi-search"></i></span>
                            <input type="text" class="form-control" name="filtro" th:value="${filtro}" placeholder="Buscar usuario, nombre, email...">
                            <button class="btn btn-primary" type="submit">Buscar</button>
                        </div>
                    </form>
                    <!-- Tabla de usuarios de ejemplo (solo nombre, email, rol, username) -->
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-primary">
                                <tr>
                                    <th><i class="bi bi-person-fill text-secondary"></i> Nombre</th>
                                    <th><i class="bi bi-envelope-fill text-secondary"></i> Email</th>
                                    <th><i class="bi bi-person-badge-fill text-secondary"></i> Rol</th>
                                    <th><i class="bi bi-person-lines-fill text-secondary"></i> Usuario</th>
                                    <th><i class="bi bi-telephone-fill text-secondary"></i> Teléfono</th>
                                    <th><i class="bi bi-toggle-on text-secondary"></i> Estado</th>
                                    <th><i class="bi bi-calendar-fill text-secondary"></i> Fecha de Registro</th>
                                    <th class="text-center"><i class="bi bi-gear-fill text-secondary"></i> Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="usuario : ${usuarios}">
                                    <td th:text="${usuario.nombre} + ' ' + ${usuario.apellidos}"></td>
                                    <td th:text="${usuario.email}"></td>
                                    <td th:text="${usuario.rol != null ? usuario.rol.nombre : 'Usuario'}"></td>
                                    <td th:text="${usuario.username}"></td>
                                    <td th:text="${usuario.telefono}"></td>
                                    <td th:text="${usuario.activo ? 'Activo' : 'Inactivo'}"></td>
                                    <td th:text="${#dates.format(usuario.fechaRegistro, 'dd/MM/yyyy HH:mm')}"></td>
                                    <td>
                                        <div class="d-flex flex-row gap-2">
                                            <!-- Botón para abrir modal de edición -->
                                            <button class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" th:attr="data-bs-target='#modalEditarUsuario' + ${usuario.idUsuario}" type="button">
                                                <i class="bi bi-pencil-square"></i> Editar
                                            </button>
                                            <!-- Modal de edición -->
                                            <div class="modal fade" th:id="'modalEditarUsuario' + ${usuario.idUsuario}" tabindex="-1" aria-labelledby="modalEditarUsuarioLabel" aria-hidden="true">
                                                <div class="modal-dialog">
                                                    <div class="modal-content">
                                                        <form th:action="@{/verUsuarios/editar}" method="post">
                                                            <div class="modal-header">
                                                                <h5 class="modal-title" id="modalEditarUsuarioLabel">Editar usuario</h5>
                                                                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                                                            </div>
                                                            <div class="modal-body">
                                                                <input type="hidden" name="idUsuario" th:value="${usuario.idUsuario}" />
                                                                <div class="mb-3">
                                                                    <label class="form-label">Nombre</label>
                                                                    <input type="text" name="nombre" class="form-control" th:value="${usuario.nombre}" required />
                                                                </div>
                                                                <div class="mb-3">
                                                                    <label class="form-label">Apellidos</label>
                                                                    <input type="text" name="apellidos" class="form-control" th:value="${usuario.apellidos}" required />
                                                                </div>
                                                                <div class="mb-3">
                                                                    <label class="form-label">Usuario</label>
                                                                    <input type="text" name="username" class="form-control" th:value="${usuario.username}" required />
                                                                </div>
                                                                <div class="mb-3">
                                                                    <label class="form-label">Email</label>
                                                                    <input type="email" name="email" class="form-control" th:value="${usuario.email}" required />
                                                                </div>
                                                                <div class="mb-3">
                                                                    <label class="form-label">Teléfono</label>
                                                                    <input type="text" name="telefono" class="form-control" th:value="${usuario.telefono}" required />
                                                                </div>
                                                                <div class="mb-3">
                                                                    <label class="form-label">Rol</label>
                                                                    <input type="number" name="idRol" class="form-control" th:value="${usuario.idRol}" required />
                                                                </div>
                                                                <div class="form-check mb-3">
                                                                    <input class="form-check-input" type="checkbox" name="activo" th:checked="${usuario.activo}" id="activoCheck" />
                                                                    <label class="form-check-label" for="activoCheck">Activo</label>
                                                                </div>
                                                            </div>
                                                            <div class="modal-footer">
                                                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                                                                <button type="submit" class="btn btn-primary">Guardar cambios</button>
                                                            </div>
                                                        </form>
                                                    </div>
                                                </div>
                                            </div>
                                            <!-- Botón para eliminar -->
                                            <form th:action="@{/verUsuarios/eliminar}" method="post" style="display:inline">
                                                <input type="hidden" name="idUsuario" th:value="${usuario.idUsuario}" />
                                                <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('¿Seguro que deseas eliminar este usuario?');">
                                                    <i class="bi bi-trash"></i> Borrar
                                                </button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="mt-4 text-center">
                        <a th:href="@{/home}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Volver al panel</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Pie de página -->
    <div th:replace="componentes/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
