<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Duit | Consultar Historial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body class="d-flex flex-column min-vh-100">
    <!-- ENCABEZADO USUARIO -->
    <div th:replace="~{componentes/headerUsuario :: headerUsuario}"></div>
    <!-- CONTENEDOR PRINCIPAL HISTORIAL -->
    <div class="container py-5 flex-grow-1">
        <h2 class="text-center mb-5"><i class="bi bi-clock-history"></i> Historial de Trabajos</h2>
        <div class="row justify-content-center g-4">
            <!-- TRABAJOS EN PROCESO -->
            <div class="col-12 col-md-4">
                <div class="card border-warning shadow-sm mb-4">
                    <div class="card-header bg-warning text-dark text-center"><i class="bi bi-hourglass-split"></i> En proceso</div>
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item" th:each="trabajo : ${trabajosEnProceso}">
                            <div class="mb-2">
                                <span class="fw-bold">Inicio:</span> <span th:text="${#dates.format(trabajo.fechaInicio, 'dd/MM/yyyy')}"></span><br>
                                <span class="fw-bold">Precio:</span> <span th:text="${trabajo.precioAcordado}"></span>€
                            </div>
                            <div class="d-flex justify-content-between">
                                <form th:action="@{/finalizarTrabajo}" method="post">
                                    <input type="hidden" name="idTrabajo" th:value="${trabajo.idTrabajo}" />
                                    <button type="submit" class="btn btn-success btn-sm w-100 mb-1"><i class="bi bi-check-circle"></i> Finalizar</button>
                                </form>
                                <form th:action="@{/cancelarTrabajo}" method="post">
                                    <input type="hidden" name="idTrabajo" th:value="${trabajo.idTrabajo}" />
                                    <button type="submit" class="btn btn-danger btn-sm w-100 mb-1"><i class="bi bi-x-circle"></i> Cancelar</button>
                                </form>
                            </div>
                        </li>
                        <li class="list-group-item text-center text-muted" th:if="${trabajosEnProceso.size()} == 0">
                            No hay trabajos en proceso.
                        </li>
                    </ul>
                </div>
            </div>
            <!-- TRABAJOS FINALIZADOS -->
            <div class="col-12 col-md-4">
                <div class="card border-success shadow-sm mb-4">
                    <div class="card-header bg-success text-white text-center"><i class="bi bi-check-circle"></i> Finalizados</div>
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item" th:each="trabajo : ${trabajosFinalizados}">
                            <div class="mb-2">
                                <span class="fw-bold">Finalizado el:</span> <span th:text="${#dates.format(trabajo.fechaFin, 'dd/MM/yyyy')}"></span><br>
                                <span class="fw-bold">Precio:</span> <span th:text="${trabajo.precioAcordado}"></span>€
                            </div>
                        </li>
                        <li class="list-group-item text-center text-muted" th:if="${trabajosFinalizados.size()} == 0">
                            No hay trabajos finalizados.
                        </li>
                    </ul>
                </div>
            </div>
            <!-- TRABAJOS CANCELADOS -->
            <div class="col-12 col-md-4">
                <div class="card border-danger shadow-sm mb-4">
                    <div class="card-header bg-danger text-white text-center"><i class="bi bi-x-circle"></i> Cancelados</div>
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item" th:each="trabajo : ${trabajosCancelados}">
                            <div class="mb-2">
                                <span class="fw-bold">Cancelado el:</span> <span th:text="${#dates.format(trabajo.fechaFin, 'dd/MM/yyyy')}"></span><br>
                                <span class="fw-bold">Precio:</span> <span th:text="${trabajo.precioAcordado}"></span>€
                            </div>
                        </li>
                        <li class="list-group-item text-center text-muted" th:if="${trabajosCancelados.size()} == 0">
                            No hay trabajos cancelados.
                        </li>
                    </ul>
                </div>
            </div>
        </div>
        <!-- BOTÓN VOLVER AL PANEL -->
        <div class="mt-4 text-center">
            <a th:href="@{/home}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Volver al panel</a>
        </div>
    </div>
    <!-- PIE DE PAGINA -->
    <div th:replace="~{componentes/footer :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
