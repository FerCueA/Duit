<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Duit | Ayuda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body class="d-flex flex-column min-vh-100">
    <!-- Sección: Encabezado de usuario -->
    <div th:replace="componentes/headerUsuario :: headerUsuario"></div>
    <div class="container-fluid flex-grow-1 d-flex align-items-center justify-content-center" style="min-height:80vh;">
        <div class="w-100" style="max-width:700px;">
            <!-- Título principal de la sección de ayuda -->
            <h2 class="text-center mb-4"><i class="bi bi-question-circle"></i> Ayuda</h2>
            <!-- Card principal de ayuda -->
            <div class="card shadow mx-auto">
                <div class="card-body">
                    <!-- Texto introductorio de ayuda -->
                    <p class="mb-3">¿Tienes dudas? Consulta nuestras preguntas frecuentes o contacta con soporte.</p>
                    <!-- Lista de preguntas frecuentes -->
                    <ul class="list-group mb-3">
                        <li class="list-group-item"><i class="bi bi-info-circle text-primary me-2"></i> ¿Cómo publico una oferta?</li>
                        <li class="list-group-item"><i class="bi bi-pencil text-success me-2"></i> ¿Cómo edito mi perfil?</li>
                        <li class="list-group-item"><i class="bi bi-envelope text-warning me-2"></i> ¿Cómo contactar con soporte?</li>
                    </ul>
                    <!-- Mensaje de contacto de soporte -->
                    <div class="alert alert-info text-center">
                        <i class="bi bi-envelope-at"></i> Para más ayuda, escribe a <a href="mailto:soporte@duit.com">soporte@duit.com</a>
                    </div>
                   
                </div>
            </div>
        </div>
    </div>
    </div>
    <!-- Pie de página -->
    <div th:replace="componentes/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
</div>
