<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Duit | Editar Perfil Profesional</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body class="d-flex flex-column min-vh-100">
    <!-- Encabezado de usuario -->
    <div th:replace="componentes/headerUsuario :: headerUsuario"></div>
    <div class="container-fluid flex-grow-1 d-flex align-items-center justify-content-center bg-light py-5">
        <div class="w-100" style="max-width:700px;">
            <h2 class="text-center mb-4"><i class="bi bi-pencil text-primary"></i> Editar Perfil Profesional</h2>
            <div class="card border-0 shadow-lg mx-auto rounded-4 animate__animated animate__fadeIn">
                <div class="card-body">
                    <form action="/perfilProfesional/editar" method="post" autocomplete="off">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label"><i class="bi bi-briefcase fs-5 text-primary"></i> Especialidad</label>
                                <input type="text" name="especialidad" class="form-control" th:value="${perfilProfesional.descripcion}" placeholder="Ejemplo: Electricista" required />
                                <div class="invalid-feedback">Por favor, introduce tu especialidad.</div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label"><i class="bi bi-calendar-check fs-5 text-primary"></i> Años de experiencia</label>
                                <input type="number" name="precioHora" class="form-control" th:value="${perfilProfesional.precioHora}" min="0" placeholder="Ejemplo: 20" required />
                                <div class="invalid-feedback">Por favor, indica tus años de experiencia.</div>
                            </div>
                        </div>
                        <hr class="my-4">
                        <div class="mb-3">
                            <label class="form-label"><i class="bi bi-card-text fs-5 text-primary"></i> Descripción profesional</label>
                            <textarea name="descripcion" class="form-control" rows="4" th:text="${perfilProfesional.descripcion}" placeholder="Describe tu experiencia, habilidades, etc." required></textarea>
                            <div class="invalid-feedback">Por favor, añade una descripción.</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label"><i class="bi bi-file-earmark-text fs-5 text-primary"></i> NIF</label>
                            <input type="text" name="nif" class="form-control" th:value="${perfilProfesional.nif}" placeholder="NIF" required />
                            <div class="invalid-feedback">Por favor, introduce tu NIF.</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label"><i class="bi bi-calendar-plus fs-5 text-primary"></i> Fecha de alta</label>
                            <input type="text" name="fechaAlta" class="form-control" th:value="${#dates.format(perfilProfesional.fechaAlta, 'dd/MM/yyyy')}" readonly />
                        </div>
                        <div class="mt-4 text-end">
                            <button type="submit" class="btn btn-success px-4"><i class="bi bi-pencil"></i> Guardar cambios</button>
                        </div>
                    </form>
                </div>
            </div>
            <div class="mt-4 text-center">
                <a th:href="@{/home}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Volver al panel</a>
            </div>
        </div>
    </div>
    <!-- Pie de página -->
    <div th:replace="componentes/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
